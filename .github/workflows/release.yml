name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bins: ugos-cli ugos-mcp
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            bins: ugos-cli ugos-mcp
          - target: x86_64-apple-darwin
            os: macos-latest
            bins: ugos-cli ugos-mcp
          - target: aarch64-apple-darwin
            os: macos-latest
            bins: ugos-cli ugos-mcp
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bins: ugos-cli.exe ugos-mcp.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            bins: ugos-cli.exe ugos-mcp.exe
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p ugos-cli -p ugos-mcp
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ugos-cli-${{ matrix.target }}.tar.gz ugos-cli ugos-mcp
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../ugos-cli-${{ matrix.target }}.zip ugos-cli.exe ugos-mcp.exe
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ugos-cli-${{ matrix.target }}
          path: |
            ugos-cli-${{ matrix.target }}.tar.gz
            ugos-cli-${{ matrix.target }}.zip

  upload-release-artifacts:
    name: Upload Release Artifacts
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ugos-cli-*/*

  update-homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: [build, upload-release-artifacts]
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: ugos-cli-*-apple-darwin
          path: ./artifacts
      - name: Calculate checksums
        id: checksums
        run: |
          X64_SHA=$(sha256sum ./artifacts/ugos-cli-x86_64-apple-darwin/ugos-cli-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          ARM64_SHA=$(sha256sum ./artifacts/ugos-cli-aarch64-apple-darwin/ugos-cli-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          LINUX_X64_SHA=$(sha256sum ./artifacts/ugos-cli-x86_64-unknown-linux-gnu/ugos-cli-x86_64-unknown-linux-gnu.tar.gz 2>/dev/null | cut -d' ' -f1 || echo "")
          LINUX_ARM64_SHA=$(sha256sum ./artifacts/ugos-cli-aarch64-unknown-linux-gnu/ugos-cli-aarch64-unknown-linux-gnu.tar.gz 2>/dev/null | cut -d' ' -f1 || echo "")
          echo "x64_sha=${X64_SHA}" >> "$GITHUB_OUTPUT"
          echo "arm64_sha=${ARM64_SHA}" >> "$GITHUB_OUTPUT"
          echo "linux_x64_sha=${LINUX_X64_SHA}" >> "$GITHUB_OUTPUT"
          echo "linux_arm64_sha=${LINUX_ARM64_SHA}" >> "$GITHUB_OUTPUT"
      - name: Download all artifacts for checksums
        uses: actions/download-artifact@v8
        with:
          pattern: ugos-cli-*-linux-gnu
          path: ./artifacts
      - name: Recalculate Linux checksums
        id: linux_checksums
        run: |
          LINUX_X64_SHA=$(sha256sum ./artifacts/ugos-cli-x86_64-unknown-linux-gnu/ugos-cli-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          LINUX_ARM64_SHA=$(sha256sum ./artifacts/ugos-cli-aarch64-unknown-linux-gnu/ugos-cli-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          echo "linux_x64_sha=${LINUX_X64_SHA}" >> "$GITHUB_OUTPUT"
          echo "linux_arm64_sha=${LINUX_ARM64_SHA}" >> "$GITHUB_OUTPUT"
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_UPDATE_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          X64_SHA=${{ steps.checksums.outputs.x64_sha }}
          ARM64_SHA=${{ steps.checksums.outputs.arm64_sha }}
          LINUX_X64_SHA=${{ steps.linux_checksums.outputs.linux_x64_sha }}
          LINUX_ARM64_SHA=${{ steps.linux_checksums.outputs.linux_arm64_sha }}

          git clone https://x-access-token:${TAP_TOKEN}@github.com/metaneutrons/homebrew-tap.git
          cd homebrew-tap
          mkdir -p Formula

          cat > Formula/ugos-cli.rb << EOF
          class UgosCli < Formula
            desc "CLI and MCP server for UGREEN NAS (UGOS) management"
            homepage "https://github.com/metaneutrons/ugos-cli"
            version "${VERSION}"
            license "GPL-3.0"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/metaneutrons/ugos-cli/releases/download/v${VERSION}/ugos-cli-x86_64-apple-darwin.tar.gz"
                sha256 "${X64_SHA}"
              else
                url "https://github.com/metaneutrons/ugos-cli/releases/download/v${VERSION}/ugos-cli-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM64_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/metaneutrons/ugos-cli/releases/download/v${VERSION}/ugos-cli-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_X64_SHA}"
              else
                url "https://github.com/metaneutrons/ugos-cli/releases/download/v${VERSION}/ugos-cli-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              end
            end

            def install
              bin.install "ugos-cli"
              bin.install "ugos-mcp"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/ugos-cli --version")
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ugos-cli.rb
          git commit -m "Update ugos-cli to ${VERSION}"
          git push

